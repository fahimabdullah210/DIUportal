<!DOCTYPE html>

<head>

    <!-- Load Lucide Icons for aesthetic appeal -->

    <style>
        /* All existing styles remain exactly the same */
        :root {
            --primary-dark: #312e81; /* Dark Purple/Blue for Sidebar & Chart Bar */
            --primary-light: #4f46e5; /* Lighter Purple/Blue */
            --accent-pink: #fbcfe8; /* Light Pink for accent strip */
            --chart-bar-light: #a7f3d0; /* Light Green for SGPA bar (Spring) */
            --text-light: #e5e7eb;
            --success-green: #10b981; /* Tailwind emerald-500 */
            --fail-red: #ef4444; /* Tailwind red-500 */
        }

        .bg-primary-dark { background-color: var(--primary-dark); }
        .text-primary-light { color: var(--primary-light); }
        .border-r-accent-pink { border-right-color: var(--accent-pink); }
        .text-success-green { color: var(--success-green); }
        .text-fail-red { color: var(--fail-red); }
        
        /* Ensure the body and main layout occupy the full viewport height */
        html, body, #app { height: 100%; margin: 0; }

        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* The main container to hold the sidebar and content */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 280px 1fr; /* Default desktop layout */
            transition: all 0.3s ease-in-out;
        }

        /* Mobile layout adjustment */
        @media (max-width: 1023px) {
            .dashboard-layout {
                grid-template-columns: 0 1fr;
            }
            .sidebar-open .dashboard-layout {
                grid-template-columns: 280px 1fr;
            }
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar-open .sidebar {
                transform: translateX(0);
                box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
                z-index: 50;
            }
            .main-content {
                width: 100%;
            }
        }
        
        /* Custom styles for the SGPA chart */
        .sgpa-chart-container {
            position: relative;
            padding-left: 30px; /* Space for Y-axis labels */
            height: 350px;
            padding-bottom: 20px; /* Space for X-axis labels */
        }
        .y-axis-label {
            position: absolute;
            left: 0; /* Align to the left edge of the padded area */
            transform: translateY(50%);
            font-size: 0.75rem;
            color: #6b7280;
            line-height: 0;
            text-align: right;
            width: 30px;
        }
        .grid-line {
            position: absolute;
            left: 30px; /* Start after the Y-axis labels */
            width: calc(100% - 30px);
            border-bottom: 1px solid #e5e7eb;
            pointer-events: none;
            z-index: 5;
        }
        .chart-bars {
            position: relative;
            z-index: 10;
            height: 100%;
            padding-left: 30px;
        }
        .chart-bar-value {
            transform: translateY(-10px); /* Lift the value slightly above the bar top */
            position: relative;
            z-index: 15;
            min-height: 1.25rem; /* Ensure space for the value text */
        }
        
        /* Custom style for the select element to match the design */
        .custom-select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='%234f46e5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpath d='m6 9 6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }

        /* New Login Page Styles */
        .login-container {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-light) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            background: var(--primary-dark);
            padding: 30px;
            text-align: center;
            color: white;
        }

        .login-form {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary-dark);
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .login-btn {
            width: 100%;
            background: var(--primary-light);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            background: var(--primary-dark);
        }

        .error-message {
            color: var(--fail-red);
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        .login-footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid #e2e8f0;
            color: #6b7280;
            font-size: 14px;
        }

        /* Dashboard hidden by default */
        #dashboard-container {
            display: none;
        }
        
        /* Hint text style */
        .login-hint {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px 12px;
            margin-top: 10px;
            font-size: 13px;
            color: #e0e7ff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { setLogLevel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app-check.js";
        
        // Setup global variables
        let app;
        let db;
        let auth;
        let userId = 'guest-user';
        
        // --- MANDATORY CANVAS GLOBAL VARIABLES ---
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { /* Mock Config */ };
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        /**
         * @function setupFirebase
         * @description Initializes Firebase services and handles authentication.
         * This function must be run before any Firestore operations.
         */
        window.setupFirebase = async function() {
            try {
                if (Object.keys(firebaseConfig).length === 0) {
                    console.warn("Firebase config is empty. Running in mock mode.");
                }
                
                setLogLevel('Debug'); // Enable debug logging for Firestore
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);

                // Authenticate user using the provided token or anonymously
                await new Promise(resolve => {
                    onAuthStateChanged(auth, async (user) => {
                        if (user) {
                            userId = user.uid;
                            console.log("Authenticated with user ID:", userId);
                        } else if (initialAuthToken) {
                            // Try to sign in with custom token
                            try {
                                await signInWithCustomToken(auth, initialAuthToken);
                            } catch (error) {
                                console.error("Custom token sign-in failed:", error);
                                await signInAnonymously(auth);
                            }
                        } else {
                            // Anonymous sign-in if no token is available
                            await signInAnonymously(auth);
                        }
                        // Update userId after potential sign-in
                        userId = auth.currentUser?.uid || 'anonymous-user';
                        window.userId = userId; // Make userId available globally for non-module scripts
                        resolve();
                    });
                });

                console.log("Firebase setup complete. Current User ID:", userId);

            } catch (error) {
                console.error("Error setting up Firebase:", error);
                // Fallback: Use a random ID if sign-in fails completely
                userId = `fallback-${crypto.randomUUID()}`;
                window.userId = userId;
            }
            // Trigger UI rendering after auth is confirmed
            // We only call renderHeader here, the main content is handled by initializeApp/renderMainContent
            if (window.renderHeader) window.renderHeader(userId);
            if (window.renderMainContent) window.renderMainContent(window.currentView);
        }

        // Expose the setup function to the global scope
        window.setupFirebase();
    </script>

        // --- LOGIN FUNCTIONS ---
        function validateLogin(studentId, password) {
            return studentId === VALID_CREDENTIALS.id && password === VALID_CREDENTIALS.password;
        }

        function showLoginError(message, elementId = 'login-error') {
            const errorElement = document.getElementById(elementId);
            errorElement.textContent = message;
            errorElement.style.display = 'block';
        }

        function hideLoginError(elementId = 'login-error') {
            const errorElement = document.getElementById(elementId);
            if (errorElement) errorElement.style.display = 'none';
        }

        function handleLogin() {
            const studentId = document.getElementById('student-id').value.trim();
            const password = document.getElementById('password').value;
            
            // Hide previous errors
            hideLoginError('id-error');
            hideLoginError('password-error');
            hideLoginError('login-error');
            
            // Basic validation
            let isValid = true;
            
            if (!studentId) {
                showLoginError('Please enter your student ID', 'id-error');
                isValid = false;
            }
            
            if (!password) {
                showLoginError('Please enter your password', 'password-error');
                isValid = false;
            }
            
            if (!isValid) return;
            
            // Validate credentials
            if (validateLogin(studentId, password)) {
                // Login successful
                window.isLoggedIn = true;
                showDashboard();
            } else {
                // Login failed
                showLoginError('Invalid student ID or password');
            }
        }

                            <h3 class="text-base font-semibold text-gray-800 mb-2">Profile Status</h3>
                            <div class="space-y-0.5 -mx-3 divide-y divide-gray-100">
                                ${PROFILE_STATUS_ITEMS.map((item, index) => renderStatusItem(item, index === PROFILE_STATUS_ITEMS.length - 1)).join('')}
                            </div>
                        </div>
                    </div>

                    <div class="col-span-1 lg:col-span-2">
                        <div class="bg-white p-6 rounded-xl shadow-lg">
                            <h3 class="text-base font-semibold text-gray-800 mb-4">Academic Information</h3>
                            <div class="flex items-center text-lg font-bold text-gray-800 mb-4">
                                B.Sc. in Computer Science & Engineering 
                                <span class="ml-4 text-xs font-semibold rounded-full px-3 py-1 bg-green-100 text-success-green">Active</span>
                            </div>

                            <div class="border rounded-lg overflow-hidden">
                                <table class="min-w-full divide-y divide-gray-200">
                                    <tbody class="bg-white divide-y divide-gray-100">
                                        ${academicTableRows.map(row => `
                                            <tr class="hover:bg-gray-50">
                                                <td class="px-6 py-3 whitespace-nowrap text-sm font-medium text-gray-500 w-1/4">${row.label}</td>
                                                <td class="px-6 py-3 whitespace-nowrap text-sm text-gray-900 w-3/4">${row.value}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                            
                            <div class="flex justify-end space-x-8 text-sm pt-4 mt-4 border-t">
                                <div>
                                    <span class="font-medium text-gray-500">Issue Date:</span> 
                                    <span class="text-gray-900">${info.issueDate}</span>
                                </div>
                                <div>
                                    <span class="font-medium text-gray-500">Expire Date:</span> 
                                    <span class="text-gray-900">${info.expireDate}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderClearanceIcon(status) {
            if (status === 'success') {
                return `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-check text-success-green"><path d="M20 6 9 17l-5-5"/></svg>`;
            } else {
                return `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x text-fail-red"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>`;
            }
        }
        
        function renderRegistrationClearance() {
            updatePageTitle('Registration/Exam Clearance', 'file-text', 'Clearance Status');

            const tableRows = CLEARANCE_DATA.map(row => `
                <tr class="text-gray-700 border-b last:border-b-0 hover:bg-gray-50 transition duration-150">
                    <td class="px-4 py-3 sm:px-6 whitespace-nowrap text-sm font-medium">${row.sl}</td>
                    <td class="px-4 py-3 sm:px-6 whitespace-nowrap text-sm">${row.semester}</td>
                    <td class="px-4 py-3 sm:px-6 whitespace-nowrap text-center">${renderClearanceIcon(row.registration)}</td>
                    <td class="px-4 py-3 sm:px-6 whitespace-nowrap text-center">${renderClearanceIcon(row.midTerm)}</td>
                    <td class="px-4 py-3 sm:px-6 whitespace-nowrap text-center">${renderClearanceIcon(row.finalExam)}</td>
                </tr>
            `).join('');

            return `
                <div class="bg-white p-4 sm:p-6 rounded-xl shadow-lg">
                    <h2 class="text-xl sm:text-2xl font-semibold text-primary-dark mb-6">Registration/Exam Clearance</h2>
                    
                    <div class="overflow-x-auto border rounded-lg">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th scope="col" class="px-4 py-3 sm:px-6 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">SL</th>
                                    <th scope="col" class="px-4 py-3 sm:px-6 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Semester</th>
                                    <th scope="col" class="px-4 py-3 sm:px-6 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Registration</th>
                                    <th scope="col" class="px-4 py-3 sm:px-6 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Mid-Term Exam</th>
                                    <th scope="col" class="px-4 py-3 sm:px-6 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Final Exam</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-100">
                                ${tableRows}
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="mt-8 p-4 bg-gray-50 rounded-lg text-sm text-gray-600">
                        <p class="flex items-center mb-2">
                            ${renderClearanceIcon('success')}
                            <span class="ml-2">Indicates clearance has been successfully granted for this component.</span>
                        </p>
                        <p class="flex items-center">
                            ${renderClearanceIcon('fail')}
                            <span class="ml-2">Indicates clearance is pending or denied. Please check your Payment Ledger.</span>
                        </p>
                    </div>
                </div>
            `;
        }

        window.handleCourseSearch = function() {
            const selectElement = document.getElementById('search-semester');
            if (selectElement) {
                window.selectedSemester = selectElement.value;
                const courseContentContainer = document.getElementById('course-list-container');
                if (courseContentContainer) {
                    courseContentContainer.innerHTML = renderCourseTable(window.selectedSemester);
                }
            }
        }
        
        function calculateTotalCredit(courses) {
            return courses.reduce((sum, course) => sum + course.credit, 0);
        }

        function renderCourseTable(semesterKey) {
            const courses = MOCK_REGISTERED_COURSES[semesterKey];
            
            if (!courses || courses.length === 0) {
                return `
                    <div class="bg-white p-12 rounded-xl text-center border-2 border-dashed border-gray-300">
                        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-alert-triangle mx-auto text-yellow-500 mb-3"><path d="m21.73 18-8-14a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
                        <p class="text-xl font-semibold text-gray-700">Not Enrolled</p>
                        <p class="text-gray-500 mt-1">No registered courses found for ${semesterKey}.</p>
                    </div>
                    <div class="mt-4 p-3 text-right text-sm font-semibold text-gray-700">
                        Total Credits: 0.0
                    </div>
                `;
            }

            const tableRows = courses.map((course, index) => `
                <tr class="text-gray-700 border-b last:border-b-0 hover:bg-gray-50 transition duration-150">
                    <td class="px-4 py-3 sm:px-6 whitespace-nowrap text-sm font-medium text-primary-light">${course.code}</td>
                    <td class="px-4 py-3 sm:px-6 text-sm text-gray-800">${course.title}</td>
                    <td class="px-4 py-3 sm:px-6 whitespace-nowrap text-center text-sm">${course.credit.toFixed(1)}</td>
                    <td class="px-4 py-3 sm:px-6 whitespace-nowrap text-sm">${course.type}</td>
                    <td class="px-4 py-3 sm:px-6 whitespace-nowrap text-center text-sm font-semibold">${course.section}</td>
                    <td class="px-4 py-3 sm:px-6 text-sm text-gray-600">${course.teacher}</td>
                </tr>
            `).join('');

            const totalCredit = calculateTotalCredit(courses).toFixed(1);

            return `
                <div class="overflow-x-auto border rounded-lg">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th scope="col" class="px-4 py-3 sm:px-6 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Course Code</th>
                                <th scope="col" class="px-4 py-3 sm:px-6 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Course Title</th>
                                <th scope="col" class="px-4 py-3 sm:px-6 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Credit</th>
                                <th scope="col" class="px-4 py-3 sm:px-6 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Type</th>
                                <th scope="col" class="px-4 py-3 sm:px-6 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Section</th>
                                <th scope="col" class="px-4 py-3 sm:px-6 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Teacher</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-100">
                            ${tableRows}
                        </tbody>
                    </table>
                </div>
                
                <div class="mt-4 p-3 text-right text-sm font-semibold text-gray-700">
                    Total Credits: ${totalCredit}
                </div>
            `;
        }

        function renderRegisteredCourse() {
            updatePageTitle('Registered Course', 'book-open', 'Semester Details');

            return `
                <div class="bg-white p-4 sm:p-6 rounded-xl shadow-lg">
                    <h2 class="text-xl sm:text-2xl font-semibold text-primary-dark mb-6">Registered Course</h2>
                    
                    <div class="flex flex-col sm:flex-row sm:items-end space-y-4 sm:space-y-0 sm:space-x-4 mb-8">
                        
                        <div class="flex-grow">
                            <label for="search-semester" class="block text-xs font-medium text-gray-700 mb-1">Search Semester</label>
                            <div class="relative">
                                <select id="search-semester" 
                                        onchange="window.selectedSemester = this.value;"
                                        class="custom-select block w-full pl-3 pr-10 py-2 border border-gray-300 bg-white rounded-md shadow-sm focus:outline-none focus:ring-primary-light focus:border-primary-light sm:text-sm">
                                    ${MOCK_SEMESTER_OPTIONS.map(option => 
                                        `<option value="${option}" ${option === window.selectedSemester ? 'selected' : ''}>${option}</option>`
                                    ).join('')}
                                </select>
                            </div>
                        </div>

                        <button onclick="handleCourseSearch()" 
                                class="bg-primary-dark text-white px-6 py-2.5 rounded-md shadow-lg hover:bg-indigo-700 transition duration-150 font-medium whitespace-nowrap">
                            Search
                        </button>
                    </div>

                    <div id="course-list-container">
                        ${renderCourseTable(window.selectedSemester)}
                    </div>

                </div>
            `;
        }

        window.renderMainContent = function(view) {
            const container = document.getElementById('content-container');
            if (!container) return;
            
            let contentHTML = '';

            switch(view) {
                case 'Dashboard':
                    contentHTML = renderDashboardContent();
                    break;
                case 'Student Profile':
                    contentHTML = renderStudentProfile();
                    break;
                case 'Registration/Exam Clearance':
                    contentHTML = renderRegistrationClearance();
                    break;
                case 'Registered Course':
                    contentHTML = renderRegisteredCourse();
                    break;
                case 'Routine':
                    contentHTML = renderRoutineContent();
                    break;
                case 'Teaching Evaluation':
                    contentHTML = renderTeachingEvaluation();
                    break;
                case 'Scholarship':
                    contentHTML = renderScholarship();
                    break;
                case 'Convocation Apply':
                    contentHTML = renderConvocationApply();
                    break;
                case 'Certificate & Transcript':
                    contentHTML = renderCertificateTranscript();
                    break;
                case 'Laptop/Tablet':
                    contentHTML = renderLaptopTablet();
                    break;
                default:
                    updatePageTitle(view, 'info', 'Coming Soon');
                    contentHTML = `
                        <div class="bg-white p-12 rounded-xl shadow-lg text-center h-[50vh] flex items-center justify-center">
                            <p class="text-xl text-gray-500">
                                <span class="font-bold text-primary-light">${view}</span> view is under construction.
                            </p>
                        </div>
                    `;
            }

            container.innerHTML = contentHTML;
            lucide.createIcons();
        }

        function initializeDashboard() {
            window.currentView = 'Dashboard';
            window.selectedSemester = 'Spring 2025, 251';

            renderSidebar();
            renderHeader();
            renderMainContent(window.currentView);
            lucide.createIcons();
        }

        // Initialize the application
        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
        });
    </script>
</body>
</html>
